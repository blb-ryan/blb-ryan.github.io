<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beast Games</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Russo+One&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
      background: #0a0e08;
      color: #e8e4d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1.25rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Subtle forest fog at bottom */
    body::after {
      content: '';
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 120px;
      background: linear-gradient(to top, rgba(10, 14, 8, 0.95), transparent);
      pointer-events: none;
      z-index: 10;
    }

    .logo {
      font-size: 3.5rem;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'Russo One', sans-serif;
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.25rem;
      text-align: center;
      color: #c8b560;
      text-shadow: 0 0 20px rgba(200, 181, 96, 0.15);
    }

    .subtitle {
      color: #5a6350;
      margin-bottom: 2.5rem;
      font-size: 0.85rem;
      font-weight: 400;
      text-align: center;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .games {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 460px;
    }

    .game-card {
      background: linear-gradient(135deg, #141a10, #181e14);
      border: 1px solid #2a3322;
      border-radius: 14px;
      padding: 1.1rem 1.25rem;
      text-decoration: none;
      color: inherit;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 1rem;
    }

    .game-card:hover {
      background: linear-gradient(135deg, #1a2216, #1e2618);
      border-color: #3d4a30;
      box-shadow: 0 4px 20px rgba(200, 181, 96, 0.06);
    }

    .game-card:active {
      background: #1e2618;
    }

    .game-card .emoji {
      font-size: 2rem;
      flex-shrink: 0;
      width: 2.75rem;
      text-align: center;
    }

    .game-card .info {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      min-width: 0;
    }

    .game-card .name {
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #d4cdb5;
    }

    .game-card .desc {
      font-size: 0.8rem;
      color: #5a6350;
      line-height: 1.35;
    }

    .game-card .arrow {
      margin-left: auto;
      color: #3d4a30;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .footprint {
      margin-top: 2rem;
      font-size: 1.5rem;
      opacity: 0.15;
      letter-spacing: 0.5rem;
    }

    footer {
      margin-top: auto;
      padding-top: 2rem;
      color: #2a3322;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="logo">🦶</div>
  <h1>Beast Games</h1>
  <p class="subtitle">Enter the wilderness</p>

  <div class="games">

    <!--
      TO ADD A NEW GAME: Copy a game-card block,
      paste it below, and update emoji/name/desc/link.
    -->

    <a class="game-card" href="https://blb-ryan.github.io/among-us-live/">
      <div class="emoji">🚀</div>
      <div class="info">
        <div class="name">Among Us Live</div>
        <div class="desc">Find the impostor in this live party game</div>
      </div>
      <div class="arrow">›</div>
    </a>

    <a class="game-card" href="https://blb-ryan.github.io/bucket-golf/">
      <div class="emoji">🏌️</div>
      <div class="info">
        <div class="name">Bucket Golf</div>
        <div class="desc">Aim, toss, and score in this backyard challenge</div>
      </div>
      <div class="arrow">›</div>
    </a>

    <a class="game-card" href="https://blb-ryan.github.io/kanjam/">
      <div class="emoji">🥏</div>
      <div class="info">
        <div class="name">KanJam</div>
        <div class="desc">Slam, deflect, and jam your way to victory</div>
      </div>
      <div class="arrow">›</div>
    </a>

  </div>

  <div class="footprint">🐾 🐾 🐾</div>

  <footer>Beast Games &copy; 2026</footer>

</body>
</html>
