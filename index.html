<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magada Family Game Night</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
      background: #111;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.25rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
      text-align: center;
    }

    .subtitle {
      color: #666;
      margin-bottom: 2.5rem;
      font-size: 0.9rem;
      font-weight: 400;
      text-align: center;
    }

    .games {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 460px;
    }

    .game-card {
      background: #1a1a1a;
      border: 1px solid #222;
      border-radius: 14px;
      padding: 1.1rem 1.25rem;
      text-decoration: none;
      color: inherit;
      transition: background 0.2s, border-color 0.2s;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 1rem;
    }

    .game-card:hover {
      background: #222;
      border-color: #333;
    }

    .game-card:active {
      background: #252525;
    }

    .game-card .emoji {
      font-size: 2rem;
      flex-shrink: 0;
      width: 2.75rem;
      text-align: center;
    }

    .game-card .info {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      min-width: 0;
    }

    .game-card .name {
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .game-card .desc {
      font-size: 0.8rem;
      color: #666;
      line-height: 1.35;
    }

    .game-card .arrow {
      margin-left: auto;
      color: #444;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    footer {
      margin-top: auto;
      padding-top: 3rem;
      color: #333;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>

  <h1>Family Game Night</h1>
  <p class="subtitle">Pick a game and let's play</p>

  <div class="games">

    <!--
      TO ADD A NEW GAME: Copy a game-card block,
      paste it below, and update emoji/name/desc/link.
    -->

    <a class="game-card" href="https://blb-ryan.github.io/among-us-live/">
      <div class="emoji">🚀</div>
      <div class="info">
        <div class="name">Among Us Live</div>
        <div class="desc">Find the impostor in this live party game</div>
      </div>
      <div class="arrow">›</div>
    </a>

    <a class="game-card" href="https://blb-ryan.github.io/bucket-golf/">
      <div class="emoji">🏌️</div>
      <div class="info">
        <div class="name">Bucket Golf</div>
        <div class="desc">Aim, toss, and score in this backyard challenge</div>
      </div>
      <div class="arrow">›</div>
    </a>

  </div>

  <footer>&copy; 2026 Magada Family Games</footer>

</body>
</html>
